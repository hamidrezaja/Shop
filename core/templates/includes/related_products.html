{% load static %}
{% load humanize %}
      <div class="row row-cols-sm-2 row-cols-md-3 row-cols-lg-4">
        {% for related_product in related_products %}
            <div class="col mb-4">
              <!-- Card -->
            
              <div class="card card-bordered shadow-none text-center h-100">
                <div class="card-pinned">
                  <img class="card-img-top" src="{{related_product.image.url}}" alt="Image Description">

                  <div class="card-pinned-top-start">
                    <span class="badge bg-success rounded-pill">جدید</span>
                  </div>

                  <div class="card-pinned-top-end">
                    <button type="button" class="btn btn-outline-secondary btn-xs btn-icon rounded-circle" data-bs-toggle="tooltip" data-bs-placement="top" title="افزودن به علایق">
                      <i class="bi-heart"></i>
                    </button>
                  </div>
                </div>

                <div class="card-body">
                  <div class="mb-2">
                    {% for cat in related_product.category.all %}
                    <a class="link-sm link-secondary" href="#">{{cat}}</a>
                    {% if not forloop.last %}
                      ,
                    {% endif %}
                    {% endfor %}
                  </div>

                  <h4 class="card-title">
                    <a class="text-dark" href="{% url 'store:product-detail' related_product.slug %}">{{ related_product.title }}</a>
                  </h4>
                  <p class="card-text text-dark"> {{ related_product.price|intcomma }} تومان </p>
                </div>

                <div class="card-footer pt-0">
                  <!-- Rating -->
                  <a class="d-inline-flex align-items-center mb-3" href="#">
                    <div class="d-flex gap-1 ms-2">
                      <img src="{% static '/svg/illustrations/star-muted.svg' %}"alt="Review rating" width="16">
                      <img src="{% static '/svg/illustrations/star-muted.svg' %}"alt="Review rating" width="16">
                      <img src="{% static '/svg/illustrations/star-muted.svg' %}"alt="Review rating" width="16">
                      <img src="{% static '/svg/illustrations/star-muted.svg' %}"alt="Review rating" width="16">
                      <img src="{% static '/svg/illustrations/star-muted.svg' %}"alt="Review rating" width="16">
                    </div>
                    <span class="small">0</span>
                  </a>
                  <!-- End Rating -->

                  <button type="button" class="btn btn-outline-primary btn-sm btn-transition rounded-pill">افزودن به سبد خرید</button>
                </div>
              </div>
              <!-- End Card -->
            </div>
        {% endfor %}
        <!-- End Col -->
      </div>
